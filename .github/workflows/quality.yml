name: Quality

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  desktop:
    name: Desktop Format/Lint/Typecheck/Test/Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check formatting
        run: pnpm fmt:check

      - name: Build Electron package
        run: pnpm build:electron

      - name: Verify desktop build outputs
        run: |
          test -f apps/desktop/.vite/renderer/main_window/index.html
          test -f apps/desktop/.vite/build/main.cjs
          if [[ ! -f apps/desktop/.vite/build/preload.js && ! -f apps/desktop/.vite/build/preload.cjs ]]; then
            echo "Missing preload bundle" >&2
            exit 1
          fi

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter desktop test:e2e:install

      - name: Run Playwright tests
        run: pnpm --filter desktop test:e2e
