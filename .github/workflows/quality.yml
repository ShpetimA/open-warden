name: Quality

on:
  pull_request:
  push:
    branches:
      - master
      - main

env:
  NODE_VERSION: 22

jobs:
  desktop:
    name: Desktop Format/Lint/Typecheck/Test/Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check formatting
        run: pnpm fmt:check

      - name: Build Electron package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          OPEN_WARDEN_UPDATE_REPOSITORY: ${{ github.repository }}
        run: pnpm build:electron

      - name: Verify desktop build outputs
        run: |
          test -f apps/desktop/dist/index.html
          test -f apps/desktop/.vite/build/main.cjs
          test -f apps/desktop/.vite/build/preload.cjs
          test -d apps/desktop/release

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter desktop test:e2e:install

      - name: Run Playwright tests
        run: pnpm --filter desktop test:e2e
